<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-6">

<!-- HEADER -->
<h1 class="text-3xl font-bold mb-6 text-center">
Job Application Dashboard
</h1>


<!-- DASHBOARD -->
<div class="grid md:grid-cols-3 gap-4 mb-8">

<div class="bg-white shadow rounded p-5 text-center">
<h2 class="text-gray-500">Total Jobs</h2>
<p id="totalCount" class="text-3xl font-bold">8</p>
</div>

<div class="bg-white shadow rounded p-5 text-center">
<h2 class="text-gray-500">Interview</h2>
<p id="interviewCount" class="text-3xl font-bold text-green-600">0</p>
</div>

<div class="bg-white shadow rounded p-5 text-center">
<h2 class="text-gray-500">Rejected</h2>
<p id="rejectedCount" class="text-3xl font-bold text-red-600">0</p>
</div>

</div>


<!-- JOB SECTION TITLE -->
<div class="flex justify-between items-center mb-4">

<h2 class="text-xl font-bold">Available Jobs</h2>

<p class="text-gray-500">
Total: <span id="sectionCount">8</span>
</p>

</div>


<!-- TABS -->
<div class="flex gap-4 mb-6">

<button onclick="showTab('all')" class="tabBtn bg-blue-500 text-white px-4 py-2 rounded">
All
</button>

<button onclick="showTab('interview')" class="tabBtn bg-gray-200 px-4 py-2 rounded">
Interview
</button>

<button onclick="showTab('rejected')" class="tabBtn bg-gray-200 px-4 py-2 rounded">
Rejected
</button>

</div>


<!-- JOB LIST -->
<div id="jobContainer" class="grid md:grid-cols-2 gap-5"></div>

</div>



<script>

const jobs = [

{
id:1,
company:"Google",
position:"Frontend Developer",
location:"California",
type:"Remote",
salary:"$120k",
description:"Build modern UI using React and Tailwind.",
status:"all"
},

{
id:2,
company:"Microsoft",
position:"UI Designer",
location:"USA",
type:"Hybrid",
salary:"$100k",
description:"Design product interfaces.",
status:"all"
},

{
id:3,
company:"Amazon",
position:"Backend Developer",
location:"Seattle",
type:"Full Time",
salary:"$130k",
description:"Work with Node.js APIs.",
status:"all"
},

{
id:4,
company:"Netflix",
position:"Software Engineer",
location:"Remote",
type:"Remote",
salary:"$140k",
description:"Streaming platform development.",
status:"all"
},

{
id:5,
company:"Meta",
position:"Mobile Developer",
location:"USA",
type:"Full Time",
salary:"$125k",
description:"React Native app development.",
status:"all"
},

{
id:6,
company:"Tesla",
position:"Full Stack Developer",
location:"Texas",
type:"Hybrid",
salary:"$135k",
description:"Develop scalable applications.",
status:"all"
},

{
id:7,
company:"Spotify",
position:"Frontend Engineer",
location:"Remote",
type:"Remote",
salary:"$110k",
description:"Music platform UI development.",
status:"all"
},

{
id:8,
company:"Adobe",
position:"UI Engineer",
location:"San Jose",
type:"Full Time",
salary:"$115k",
description:"Creative cloud interface design.",
status:"all"
}

];

let currentTab = "all";

function renderJobs(){

const container = document.getElementById("jobContainer");
container.innerHTML="";

let filtered;

if(currentTab==="all"){
filtered = jobs;
}else{
filtered = jobs.filter(job=>job.status===currentTab);
}

if(filtered.length===0){

container.innerHTML = `
<div class="col-span-2 text-center p-10 bg-white rounded shadow">
<p class="text-2xl">No jobs Available</p>
<p class="text-gray-500">There are no jobs in this section.</p>
</div>
`;

return;
}

filtered.forEach(job=>{

const card = document.createElement("div");

card.className="bg-white shadow rounded p-5";

card.innerHTML = `

<h3 class="text-xl font-bold">${job.position}</h3>

<p class="text-gray-500">${job.company} • ${job.location}</p>

<p class="text-sm mt-2">${job.type} | ${job.salary}</p>

<p class="mt-3 text-gray-600">${job.description}</p>

<div class="flex gap-2 mt-4">

<button onclick="setInterview(${job.id})"
class="bg-green-500 text-white px-3 py-1 rounded">
Interview
</button>

<button onclick="setRejected(${job.id})"
class="bg-red-500 text-white px-3 py-1 rounded">
Rejected
</button>

<button onclick="deleteJob(${job.id})"
class="bg-gray-700 text-white px-3 py-1 rounded">
Delete
</button>

</div>

`;

container.appendChild(card);

});

updateCounts();

}


function setInterview(id){

const job = jobs.find(j=>j.id===id);

job.status="interview";

renderJobs();

}

function setRejected(id){

const job = jobs.find(j=>j.id===id);

job.status="rejected";

renderJobs();

}

function deleteJob(id){

const index = jobs.findIndex(j=>j.id===id);

jobs.splice(index,1);

renderJobs();

}

function showTab(tab){

currentTab=tab;

renderJobs();

}

function updateCounts(){

const interview = jobs.filter(j=>j.status==="interview").length;
const rejected = jobs.filter(j=>j.status==="rejected").length;

document.getElementById("interviewCount").innerText = interview;
document.getElementById("rejectedCount").innerText = rejected;

document.getElementById("totalCount").innerText = jobs.length;
document.getElementById("sectionCount").innerText = jobs.length;

}

renderJobs();

</script>

</body>
</html>
