<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style type="text/tailwindcss">
    @theme {
        --color-clifford: #da373d;
      }
    </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Job Application</title>
</head>

<body class="bg-gray-100">
  <div class="max-w-6xl mx-auto p-8 ">

    <!-- Dashboard Count Part-->
    <h1 class="text-4xl font-bold mb-6 ">
      Job Application Tracker
    </h1>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

      <div class="bg-white shadow rounded p-5">
        <h2 class="text-gray-500">Total Jobs</h2>
        <p id="totalCount" class="text-3xl font-bold">8</p>
      </div>

      <div class="bg-white shadow rounded p-5 ">
        <h2 class="text-gray-500">Interview</h2>
        <p id="interviewCount" class="text-3xl font-bold text-green-600">0</p>
      </div>

      <div class="bg-white shadow rounded p-5 ">
        <h2 class="text-gray-500">Rejected</h2>
        <p id="rejectedCount" class="text-3xl font-bold text-red-600">0</p>
      </div>
    </div>

    <!-- JOB SECTION -->

    <div class="flex justify-between mb-6">
      <h2 class="text-xl font-bold text-gray-800">Available Jobs</h2>
      <p class="text-gray-700">Total: <span id="sectionCount">8</span></p>
    </div>


    <!-- TABS -->
    <div class="flex gap-3 mb-6">

      <button onclick="showTab('all')" id="tabAll"
        class="tabBtn px-4 py-2 rounded bg-gray-200 text-gray-700 font-medium hover:bg-blue-500  hover:text-white transitio ">
        All
      </button>

      <button onclick="showTab('interview')" id="tabInterview"
        class="tabBtn px-4 py-2 rounded bg-gray-200 text-gray-700 font-medium hover:bg-blue-500 hover:text-white transition">
        Interview
      </button>

      <button onclick="showTab('rejected')" id="tabRejected"
        class="tabBtn px-4 py-2 rounded bg-gray-200 text-gray-700 font-medium hover:bg-blue-500 hover:text-white transition">
        Rejected
      </button>

    </div>

    <!-- JOB LIST -->

    <div id="jobContainer" class="grid md:grid-cols-1 gap-6">


    </div>


    <script src="./script.js/object_array.js"></script>
    <script src="./script.js/machine.js"></script>

  </div>
</body>

</html>
